# Production: standalone build served by `node server.js`.
#   docker compose -f docker-compose.prod.yml up --build
# NEXT_PUBLIC_API_URL is baked into the client bundle at BUILD time, so it is
# passed as a build arg (not just a runtime env var).
services:
  web:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_API_URL: https://api.escuelasoberana.com
    image: soberana-landing:prod
    container_name: soberana-landing-prod
    environment:
      - NODE_ENV=production
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.landing.rule=Host(`escuelasoberana.com`) || Host(`www.escuelasoberana.com`)
      - traefik.http.routers.landing.entrypoints=websecure
      - traefik.http.routers.landing.tls.certresolver=le
      - traefik.http.services.landing.loadbalancer.server.port=3000
    restart: unless-stopped

networks:
  web:
    external: true
